
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball 2024 - Bedava Para Kazanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .troll-content {
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .middle-finger {
            font-size: 120px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Form Alanı (Başlangıçta Görünür) -->
    <div id="mainForm" class="max-w-md w-full card rounded-3xl p-8 shadow-2xl text-center">
        <div class="mb-6">
            <div class="inline-block p-4 rounded-2xl bg-yellow-400 mb-4 shadow-[0_0_20px_rgba(250,204,21,0.4)]">
                <span class="text-black font-black text-2xl uppercase tracking-wider">120 eFootball Coins</span>
            </div>
            <h1 class="text-2xl font-bold mb-2">Hediye Para Etkinliği</h1>
            <p class="text-gray-400 text-sm">Ücretsiz paralarınızı hesabınıza tanımlamak için kullanıcı adınızı girin.</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="username" placeholder="Kullanıcı Adı (Örn: Messi10)" 
                class="w-full px-5 py-4 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-400 transition-all text-white placeholder:text-gray-500">
            
            <button onclick="revealTroll()" 
                class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-black font-black rounded-xl transition-transform active:scale-95 uppercase tracking-widest shadow-lg">
                GÖNDER VE KAZAN
            </button>
        </div>

        <div class="mt-8 flex items-center justify-center gap-4 opacity-50 text-xs">
            <span class="flex items-center gap-1">🟢 Sunucu Aktif</span>
            <span class="flex items-center gap-1">🔒 Güvenli Bağlantı</span>
        </div>
    </div>

    <!-- Troll Alanı (Gizli) -->
    <div id="trollSection" class="troll-content max-w-lg w-full text-center p-6">
        <div class="middle-finger mb-6">🖕</div>
        <div class="bg-red-600/20 border-2 border-red-600 p-8 rounded-[40px] shadow-[0_0_50px_rgba(220,38,38,0.3)]">
            <p id="trollMessage" class="text-2xl md:text-3xl font-black leading-tight text-white drop-shadow-lg">
                Bu devirde millet birbirine bok vermiyo sen buraya sik sik gelip beleş efootball parasımı alcan bok bekle y#rr#mın kafası🤣
            </p>
        </div>
        
        <button onclick="location.reload()" class="mt-8 text-gray-500 hover:text-white underline text-sm">
            Tekrar Dene (Belki Bu Sefer Olur!)
        </button>
    </div>

    <script>
        function revealTroll() {
            const user = document.getElementById('username').value.trim();
            
            if (user === "") {
                const msgBox = document.createElement('div');
                msgBox.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full shadow-lg z-50 font-bold";
                msgBox.innerText = "Lütfen kullanıcı adınızı girin!";
                document.body.appendChild(msgBox);
                setTimeout(() => msgBox.remove(), 2000);
                return;
            }

            // Formu gizle, trollü göster
            document.getElementById('mainForm').style.display = 'none';
            document.body.classList.add('gradient-bg');
            
            const trollSection = document.getElementById('trollSection');
            trollSection.style.display = 'block';
            
            // Hafif bir gecikme ile ses efekti eklenebilir (opsiyonel)
            // Sayfa etkileşimi olduğu için tarayıcı engellemez
        }
    </script>
</body>
</html>
